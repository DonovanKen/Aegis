version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis123
      POSTGRES_DB: aegis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  auth-service:
    build: ./services/AuthService
    ports:
      - "5001:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=aegis_db;Username=aegis;Password=aegis123
      - JWT__Key=votre_cle_secrete_ici_32_caracteres_minimum
      - JWT__Issuer=aegis-corepond
      - JWT__Audience=aegis-webapp
    depends_on:
      - postgres

  patient-service:
    build: ./services/PatientService
    ports:
      - "5002:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=aegis_db;Username=aegis;Password=aegis123
    depends_on:
      - postgres

  intervention-service:
    build: ./services/InterventionService
    ports:
      - "5003:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=aegis_db;Username=aegis;Password=aegis123
    depends_on:
      - postgres

  api-gateway:
    build: ./api-gateway/YarpGateway
    ports:
      - "8080:80"
    environment:
      - AUTH_SERVICE_URL=http://auth-service
      - PATIENT_SERVICE_URL=http://patient-service
      - INTERVENTION_SERVICE_URL=http://intervention-service
    depends_on:
      - auth-service
      - patient-service
      - intervention-service

  frontend:
    build: ./frontend/aegis-webapp
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data: