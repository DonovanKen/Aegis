<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis-CoRespond - Intervention Santé Mentale</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Navigation dynamique -->
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <span class="logo-icon">🛡️</span>
                    <span class="logo-text">Aegis-CoRespond</span>
                </div>
                <div class="nav-links" id="navLinks">
                    <a href="#" onclick="navigateTo('dashboard')" class="nav-link">Tableau de bord</a>
                    <a href="#" onclick="navigateTo('patients')" class="nav-link">Patients</a>
                    <a href="#" onclick="navigateTo('interventions')" class="nav-link">Interventions</a>
                </div>
                <div class="user-info">
                    <span id="userName">Utilisateur</span>
                    <button onclick="logout()" class="btn-logout">Déconnexion</button>
                </div>
            </div>
        </nav>

        <!-- Contenu principal -->
        <main id="mainContent">
            <div class="loading-container" id="loading">
                <div class="spinner"></div>
                <p>Chargement...</p>
            </div>
            <div id="content"></div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/patient.js"></script>
    <script src="/js/intervention.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
